<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Contact | Willow & Fern Reiki</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HERO */
.hero {
  height: 35vh;
  background-image: url('https://images.unsplash.com/photo-1506126613408-eca07ce68773?q=80&w=1600&auto=format&fit=crop');
  background-size: cover;
  background-position: center;
  position: relative;
  margin-bottom: 40px;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(221,233,225,0.12);
}

/* FORM WRAPPER */
.form-wrapper {
  max-width: 700px;
  margin: auto;
}

/* SMALL NOTE */
.note {
  font-size: 13px;
  opacity: 0.75;
  margin-bottom: 20px;
}

/* FOOTER (CONSISTENT GLOBAL STYLE) */
footer {
  position: sticky;
  bottom: 0;
  background: rgba(247,246,243,0.95);
  backdrop-filter: blur(8px);
  border-top: 1px solid rgba(0,0,0,0.06);
  padding: 14px 20px;
  font-size: 12px;
  display: flex;
  justify-content: center;
  gap: 18px;
  color: rgba(38,53,45,0.75);
}

footer a {
  color: inherit;
  text-decoration: none;
}

footer a:hover {
  color: #6F9E7F;
}

</style>

</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="growth-library.html">The Growth Library</a>
  <a href="testimonials.html">Testimonials</a>
  <a href="contact.html" class="active">Contact Us</a>
</nav>

<div class="hero"></div>

<div class="container">

<h1>Contact</h1>

<p>
If you’d like to book a session, ask a question, or suggest a book for the Growth Library, you’re welcome to reach out below.
</p>

<div class="form-wrapper">

<form id="contact-form">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Reason for enquiry</label>
<select name="reason" required>

  <option value="">Select an option</option>
  <option value="booking">Booking a Reiki Session</option>
  <option value="question">General Question</option>
  <option value="suggest-book">Suggest a Book (Growth Library)</option>
  <option value="other">Other</option>

</select>

<label>Message</label>
<textarea name="message" rows="6" required></textarea>

<button class="button" type="submit">Send Message</button>

</form>

<p class="note">
I aim to respond within 24–48 hours.
</p>

</div>

</div>

<footer>
  <a href="privacy.html">Privacy Policy</a>
  <span>•</span>
  <a href="terms.html">Terms & Conditions</a>
</footer>

</body>
</html>
