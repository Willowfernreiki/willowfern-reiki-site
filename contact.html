<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Book Reiki Session UK | Willow & Fern Reiki</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Book a Reiki healing session in the UK with Willow Fern Reiki. In-person, distance, corporate and open-air Reiki available.">

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* HERO */
.dual-hero {
  display: flex;
  width: 100%;
  height: 40vh;
  overflow: hidden;
  margin-bottom: 32px;
}

.hero-image {
  flex: 1;
  background-size: cover;
  background-position: center;
  position: relative;
}

.hero-image::after {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(221,233,225,0.12);
}

/* TYPOGRAPHY */
h1 {
  font-size: 42px;
  margin: 0 0 12px 0;
}

p {
  line-height: 1.8;
  max-width: 750px;
  margin: 0 0 16px 0;
  font-size: 16px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 650px;
  margin-top: 16px;
}

label {
  font-size: 14px;
  font-weight: 500;
}

input,
select,
textarea {
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid rgba(0,0,0,0.08);
  font-family: inherit;
  font-size: 15px;
  background: rgba(255,255,255,0.9);
}

input:focus,
select:focus,
textarea:focus {
  border-color: #AEBFA9;
  outline: none;
}

/* BUTTON */
.button {
  display: inline-block;
  padding: 10px 18px;
  background: #AEBFA9;
  color: white;
  border-radius: 30px;
  font-weight: bold;
  border: none;
  cursor: pointer;
  transition: 0.25s ease;
  font-family: inherit;
  margin-top: 10px;
}

.button:hover {
  background: #9FB19A;
  transform: translateY(-2px);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px 20px;
  font-size: 13px;
  color: rgba(38,53,45,0.7);
}

footer a {
  color: inherit;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="services.html">Services</a>
  <a href="growth-library.html">The Growth Library</a>
  <a href="testimonials.html">Testimonials</a>
  <a href="contact.html" class="active">Contact Us</a>
</nav>

<div class="dual-hero">

  <div class="hero-image" style="background-image:url('https://images.pexels.com/photos/16654882/pexels-photo-16654882.jpeg');"></div>

  <div class="hero-image" style="background-image:url('https://images.unsplash.com/photo-1722554086475-f11257a9eb6d?w=1200&auto=format&fit=crop');"></div>

</div>

<div class="container">

  <h1>Book a Reiki Session</h1>

  <p>
    Please use the form below to book or enquire. I will respond within 24–48 hours.
  </p>

  <form action="https://formspree.io/f/YOUR_FORM_ID_HERE" method="POST">

    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Phone (optional)</label>
    <input type="text" name="phone">

    <label>Session Type</label>
    <select name="service">
      <option>1:1 Energy & Emotional Balance</option>
      <option>Distance Reiki</option>
      <option>Nature-based Reiki</option>
      <option>Corporate Reiki</option>
    </select>

    <label>Message</label>
    <textarea name="message" rows="6"></textarea>

    <button class="button" type="submit">Submit Request</button>

  </form>

</div>

<footer>
  <span>© 2026 Willow & Fern Reiki</span> •
  <a href="privacy.html">Privacy Policy</a> •
  <a href="terms.html">Terms & Conditions</a>
</footer>

</body>
</html>
